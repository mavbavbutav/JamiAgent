apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: jami-agent-indexer
spec:
  template:
    spec:
      template:
        metadata:
          annotations:
            run.googleapis.com/cloudsql-instances: PROJECT_ID:REGION:INSTANCE_NAME
        spec:
          serviceAccountName: jami-agent-runtime@PROJECT_ID.iam.gserviceaccount.com
          containers:
            - image: REGION-docker.pkg.dev/PROJECT_ID/jami-agent/api:latest
              command: ["python", "-m", "app.jobs.index_documents"]
              env:
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: OPENAI_API_KEY
                      key: latest
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: DATABASE_URL
                      key: latest
                - name: ENVIRONMENT
                  value: production
                - name: DEBUG
                  value: "false"
          restartPolicy: Never
      taskCount: 1
